name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g. 1.0.0)'
        required: true

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Generate licenses
        run: python3 scripts/generate-licenses.py

      - name: Install cargo-bundle
        run: cargo install cargo-bundle

      - name: Bundle
        run: cargo bundle --release

      - name: Zip
        run: zip -r PicoNote-${{ inputs.tag_name || github.ref_name }}-macos.zip target/release/bundle/osx/PicoNote.app

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: PicoNote-${{ inputs.tag_name || github.ref_name }}-macos.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Generate licenses
        run: python3 scripts/generate-licenses.py

      - name: Build
        run: cargo build --release

      - name: Zip
        run: Compress-Archive -Path target/release/piconote.exe -DestinationPath PicoNote-${{ inputs.tag_name || github.ref_name }}-windows.zip

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: PicoNote-${{ inputs.tag_name || github.ref_name }}-windows.zip
